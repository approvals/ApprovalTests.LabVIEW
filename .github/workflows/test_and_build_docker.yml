name: CI - Test&Build - Docker
on: 
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # keeps GitHub from removing runner due to inactivity
jobs:
  test:
    runs-on: ubuntu-latest
    steps: 
      - name: Log in to GitLab Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
          password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}
      - name: Pull and use GitLab image
        run: docker pull registry.gitlab.com/stagg54/labview-docker-builds:lv26q1_vipm_gcli
      - name: Create aliases
        run: alias vipm=/usr/local/bin/vipm && alias g-cli=usr/local/bin/g-cli
      - name: Check activation
        run: vipm about
      - name: Refresh package list
        run: vipm package-list-refresh

      - name: Install project dependencies
        run: vipm install project.vipc

      - name: List installed packages
        run: vipm list --installed
      - name: Run Unit Tests
        shell: bash
        run: ./scripts/run_unittests.sh
      - name: Build Package
        shell: bash
        run: ./scripts/build.sh $GITHUB_RUN_NUMBER  
      - name: Install 
        shell: bashvipm
        run: ./scripts/install.sh 
      - name: Create Install Tests
        shell: bash
        run: ./scripts/create_install_tests.sh
      - name: Rerun Tests on Installed Libraries 
        shell: bash
        run: ./scripts/run_install_tests.sh
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: 'reports/*.xml'
      - name: Grab Artifacts
        if: success() || failure() # always run even if the previous step fails
        uses: actions/upload-artifact@v4
        with:
          name: artifacts 
          path: |
            build/*.vip
            reports
