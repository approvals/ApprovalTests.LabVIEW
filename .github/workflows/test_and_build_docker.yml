name: CI - Test&Build - Docker
on: 
  push:
jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/stagg54/labview-docker-builds/lv26q1_vipm_gcli:approvals
      credentials:
        username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
        password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}
    env:
      DISPLAY: :99  # set at job level so every step inherits it
    steps:
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "Xvfb PID: $!"
          sleep 1 # let it initialize
      - name: Start NI Service Locator # needed for G-CLI
        shell: bash
        run: nohup nisvcloc &
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - name: Check activation
        run: vipm about
      - name: Refresh package list
        run: vipm package-list-refresh
      - name: Install project dependencies
        run: vipm install approvals-dev.vipc
      - name: List installed packages
        run: vipm list --installed
      - name: Run Caraya Extension Tests
        shell: bash
        run: g-cli Caraya -- -s "Tests/Caraya.Tests/Caraya Extension Tests/Caraya Extension Tests.lvclass" -x "reports/Caraya.UnitTestReport.xml"
      - name: Run LUnit Extension Tests
        shell: bash
        run: g-cli lunit -- -r "reports/LUnit.UnitTestReport.xml" "Approval Testing.lvproj"
      - name: Run Error Propagation Tests
        shell: bash
        run: g-cli Caraya -- -s "Tests/Error.Propagation.Tests/Error.Propagation.Tests.lvclass" -x "reports/Error.Propagation.UnitTestReport.xml"
      - name: Build Package
        shell: bash
        run: ./scripts/build.sh $GITHUB_RUN_NUMBER  
      - name: Install 
        shell: bashvipm
        run: ./scripts/install.sh 
      - name: Create Install Tests
        shell: bash
        run: ./scripts/create_install_tests.sh
      - name: Rerun Tests on Installed Libraries 
        shell: bash
        run: ./scripts/run_install_tests.sh
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success300000() || failure() # always run even if the previous step fails
        with:
          report_paths: 'reports/*.xml'
      - name: Grab Artifacts
        if: success() || failure() # always run even if the previous step fails
        uses: actions/upload-artifact@v6
        with:
          name: artifacts 
          path: |
            build/*.vip
            reports
            **/*.received.*
