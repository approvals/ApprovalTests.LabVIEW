name: CI - Test&Build - Docker
on:
  workflow_dispatch: # disabled automatic triggers; run manually via GitHub Actions UI if needed
jobs:
  test_and_build:
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/stagg54/labview-docker-builds/lv26q1_vipm_gcli:approvals
      credentials:
        username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
        password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}
    env:
      DISPLAY: :99  # set at job level so every step inherits it
    steps:
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "Xvfb PID: $!"
          sleep 1 # let it initialize
      - name: Start NI Service Locator # needed for G-CLI
        shell: bash
        run: nohup nisvcloc &
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - name: Prep ini file
        shell: bash
        run: ./scripts/prep_ini_file.sh 
      - name: Check Versions
        run: |
          cat /etc/os-release
          dpkg -l | grep labview
          vipm about
          g-cli --version
          git --version
          mkdir reports
      - name: Refresh package list
        run: vipm package-list-refresh
      - name: Install project dependencies
        run: vipm install approvals-dev.vipc
      - name: List installed packages
        run: vipm list --installed
      - name: Run Caraya Extension Tests
        shell: bash
        run: g-cli Caraya -- -s "Tests/Caraya.Tests/Caraya Extension Tests/Caraya Extension Tests.lvclass" -x "reports/Caraya.UnitTestReport.xml"
      - name: Run LUnit Extension Tests
        shell: bash
        run: g-cli lunit -- -r "reports/LUnit.UnitTestReport.xml" "Approval Testing.lvproj"
      - name: Run Error Propagation Tests
        shell: bash
        run: |
          for i in 1 2 3; do
            g-cli Caraya -- -s "Tests/Error.Propagation.Tests/Error.Propagation.Tests.lvclass" -x "reports/Error.Propagation.UnitTestReport.xml" && break
            echo "Attempt $i failed, retrying..."
            [ $i -eq 3 ] && exit 1
            sleep 10
          done
      - name: Verify ini file
        shell: bash
        run: cat /root/natinst/.config/LabVIEW-2026/labview64.ini 
      - name: Launch LabVIEW and Verify VI Server
        shell: bash
        run: |
          pkill -f g-cli || true
          pkill -f labview || true
          apt-get install -y lsof
          for i in {1..3}; do
            echo "Attempt $i: launching LabVIEW..."
            nohup labview64 > /tmp/lv_launch.log 2>&1 &
            LV_PID=$!
            echo "LabVIEW PID: $LV_PID"
            sleep 60
            echo "--- LabVIEW stdout/stderr ---"
            cat /tmp/lv_launch.log || true
            echo "--- Processes ---"
            ps aux | grep -i labview || true
            echo "--- Port 3363 ---"
            lsof -i :3363 || true
            if lsof -i :3363 | grep LISTEN; then
              echo "VI server is up on attempt $i"
              break
            fi
            echo "VI server not detected on attempt $i, killing LabVIEW and retrying..."
            pkill -f labview64 || true
            sleep 5
            # if [ $i -eq 10 ]; then
            #   echo "VI server failed to come up after 10 attempts"
            #   exit 1
            # fi
          done
      - name: Build Package
        shell: bash
        run: |
          version="3.0.0"
          full_version="${version}.${GITHUB_RUN_NUMBER}"
          vipb="Approval Tests.vipb"
          apt update && apt install -y xmlstarlet dos2unix
          xmlstarlet ed --inplace -u VI_Package_Builder_Settings/Advanced_Settings/Description/Package_LabVIEW_Version --value "26.0 (64-bit)" "${vipb}"
          xmlstarlet ed --inplace -u VI_Package_Builder_Settings/Advanced_Settings/Description/Release_Notes --value "$(dos2unix release-notes.txt && cat release-notes.txt)" "${vipb}"
          xmlstarlet ed --inplace -u VI_Package_Builder_Settings/Library_General_Settings/Library_Version --value "${full_version}" "${vipb}"
          for i in 1 2 3; do
            vipm --labview-version 2026 build "${vipb}" && break
            echo "Build attempt $i failed, retrying..."
            [ $i -eq 3 ] && exit 1
            sleep 10
          done


      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: 'reports/*.xml'
      - name: Grab Reports 
        if: success() || failure() # always run even if the previous step fails
        uses: actions/upload-artifact@v6
        with:
          name: artifacts 
          path: |
            reports
            **/*.received.*
            /usr/local/jki/vipm/VIPM-CLI/error  
            /var/local/natinst/logs  
      - name: Grab Artifacts
        if: success() || failure() # always run even if the previous step fails
        uses: actions/upload-artifact@v6
        with:
          name: built_package
          path: build/*.vip

  install_and_test:
    needs: test_and_build
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/stagg54/labview-docker-builds/lv26q1_vipm_gcli:approvals
      credentials:
        username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
        password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}
    env:
      DISPLAY: :99  # set at job level so every step inherits it
    steps:
      - name: Get Artifacts
        uses: actions/download-artifact@v6
        with:
          name: built_package
          path: package.vip
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "Xvfb PID: $!"
          sleep 1 # let it initialize
      - name: Start NI Service Locator # needed for G-CLI
        shell: bash
        run: nohup nisvcloc &
      - name: Prep ini file
        shell: bash
        run: ./scripts/prep_ini_file.sh 
      - name: Check Versions
        run: |
          cat /etc/os-release
          dpkg -l | grep labview
          vipm about
          g-cli --version
          git --version
          mkdir reports
      - name: Refresh package list
        run: vipm package-list-
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - name: Install 
        run: vipm install package.vip
      - name: Create Install Tests
        shell: bash
        run: ./scripts/create_install_tests.sh
      - name: Rerun Tests on Installed Libraries 
        shell: bash
        run: ./scripts/run_install_tests.sh
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: 'reports/*.xml'
      - name: Grab Artifacts
        if: success() || failure() # always run even if the previous step fails
        uses: actions/upload-artifact@v6
        with:
          name: artifacts 
          path: |
            reports
            **/*.received.*
