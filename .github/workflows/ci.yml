name: ci-checks

on:
  push:
  workflow_dispatch:

jobs:
  PylaviChecks:
  
    runs-on: ubuntu-latest

    env:
      LABVIEW_VERSION_NUMBER: '20.1'
      LABVIEW_VERSION_YEAR: '2020'
      LABVIEW_BITNESS: '64'

    steps:

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # cache: 'pip'
          

      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install pylavi
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv venv
          uv pip install pylavi

      - name: Run pylavi Tests
        run: |
          echo running pylavi tests
          source .venv/bin/activate
          vi_validate \
            --path source \
            --path tests \
            --gt 20 --lt 21 \
            --skip *.vit \
            --no-code \
            --breakpoints
          echo finished pylavi tests

  Test_And_Build:

    runs-on: ubuntu-latest

    # LabVIEW container defaults to `sh`. Set it to `bash`, so there are no surprises with syntax in the steps.
    defaults:
      run:
        shell: bash

    # The official LabVIEW container image from NI
    container:
      image: nationalinstruments/labview:2026q1patch2-linux

    env:
      LABVIEW_IMAGE: 2026q1patch2-linux
      VIPM_RELEASE_TYPE: preview
      VIPM_VERSION: 26.3.0-3991
      VIPM_COMMUNITY_EDITION: true
      VIPM_DESKTOP_LIVELINESS_TIMEOUT: 600
      PACKAGE_VERSION: 3.0.0
      VIPM_NON_INTERACTIVE: 1
      VIPM_ASSUME_YES: 1
      VIPM_DEBUG: 1


    steps:

      - name: Setup Variables
        run: |
          # Derive LabVIEW version year from the container image tag
          LABVIEW_VERSION_YEAR="${LABVIEW_IMAGE:0:4}" # e.g. "2026" from "2026q1-linux"
          echo "LABVIEW_VERSION_YEAR=${LABVIEW_VERSION_YEAR}" >> "$GITHUB_ENV"

      - name: GitHub Setup for LabVIEW Container
        run: |
          # LabVIEW Container images put default config in /root home dir, but GitHub Actions sets $HOME to /github/home.
          cp -R /root/natinst /github/home/natinst
          chown -R $(id -u):$(id -g) /github/home/natinst

      # wget is required to download VIPM, and is not included in the base LabVIEW image.
      - name: Install VIPM
        run: |
          apt-get update && apt-get install -y wget
          wget -O /tmp/vipm.deb \
            https://packages.jki.net/vipm/preview/vipm_latest_preview_amd64.deb
          dpkg -i /tmp/vipm.deb && rm /tmp/vipm.deb
          vipm --version

      - name: Install git for actions/checkout
        # git is required for the actions/checkout step, but is not included in the base LabVIEW image.                                                                         
        run: apt-get update && apt-get install -y git                                                                         
      - name: Checkout code                                                                                                   
        uses: actions/checkout@v6
        with:
          submodules: recursive

        # This is a reusable script to set up the display for VIPM and LabVIEW.
        # see https://docs.vipm.io/preview/cli/docker/#display-and-labview-setup-linux-containers
      - name: Write setup-display.sh
        run: |
          cat > setup-display.sh <<'EOF'
          TARGET_DISPLAY=:99
          export DISPLAY="$TARGET_DISPLAY"
          # Start Xvfb if it is not already running. If it is already running, assume it is correctly configured for this container and do nothing.
          if ! pgrep -x Xvfb > /dev/null; then
              Xvfb "$TARGET_DISPLAY" -screen 0 1280x720x24 -ac +extension GLX +render -noreset \
                  > /tmp/xvfb.log 2>&1 &
          fi
          # Writing this marker file is critical and if if it is not present, the LabVIEW Runtime Engine (required by vipm) may not start properly.
          mkdir -p /tmp/natinst && echo "1" > /tmp/natinst/LVContainer.txt
          # This container has no browser/D-Bus session. Some package post-install actions try to open a URL
          # in the default browser, which can hang for minutes waiting on xdg-open/D-Bus before giving up.
          # Start Xvfb before the LabVIEW Runtime Engine initializes, which happens on the first `vipm` command.
          echo "$(pgrep -x Xvfb > /dev/null && echo "Xvfb running (DISPLAY=$TARGET_DISPLAY)" || echo "WARNING: Xvfb is required by vipm, but failed to start; DISPLAY=$DISPLAY may not work. Check /tmp/xvfb.log for details.")"
          EOF

      # g-cli doesn't talk to LabVIEW over VI Server. It launches LabVIEW with a target VI, and that VI
      # connects back to g-cli on a port it discovers via nisvcloc (the NI Service Locator). Every CI
      # attempt so far has just backgrounded nisvcloc with `&` and hoped for the best. This step checks
      # whether nisvcloc actually starts and stays alive in this container, before we build anything on
      # top of that assumption. It never fails the job.
      - name: Start nisvcloc
        continue-on-error: true
        run: |
          echo "=== Starting nisvcloc ==="
          nohup nisvcloc > /tmp/nisvcloc.log 2>&1 &
          NISVCLOC_PID=$!
          echo "nisvcloc PID: $NISVCLOC_PID"
          sleep 3
  
       
      # Use GitHub's caching action to cache VIPM's package cache.
      - name: Cache VIPM packages
        id: cache-vipm
        uses: actions/cache@v5
        env:
          # Increment this to invalidate the cache (restore-keys included).
          CACHE_VERSION: 1
        with:
          path: |
            /usr/local/natinst/LabVIEW*/
            /usr/local/jki/vipm/cache/
            /usr/local/jki/vipm/db/
          # Key includes hashes of the project package manifests (.vipc and .dragon files)
          key: vipm-v${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ env.LABVIEW_IMAGE }}-${{ env.VIPM_VERSION }}-${{ hashFiles('approvals-dev.vipc', 'error.dragon') }}
          restore-keys: |
            vipm-v${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ env.LABVIEW_IMAGE }}-${{ env.VIPM_VERSION }}-
            vipm-v${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ env.LABVIEW_IMAGE }}-

      - name: Activate VIPM
        run: |
          source setup-display.sh
          echo "Activating VIPM"
          vipm activate --serial-number "${{ secrets.VIPM_SERIAL_NUMBER }}" --name "${{ secrets.VIPM_FULL_NAME }}" --email "${{ secrets.VIPM_EMAIL}}"
      - name: Print VIPM About
        run: vipm about

      - name: VIPM Refresh Package Index
        # we will refresh before building the package
        if: true
        run: |
          source setup-display.sh
          echo "Starting LabVIEW"
          /usr/local/natinst/LabVIEW-${LABVIEW_VERSION_YEAR}-64/labview --headless &

          vipm refresh --show-progress # --verbose

      - name: VIPM List Packages
        run: vipm list approvals-dev.vipc

      - name: VIPM Install Packages
        if: steps.cache-vipm.outputs.cache-hit != 'true'
        run: |
          source setup-display.sh
          echo "Starting LabVIEW"
          /usr/local/natinst/LabVIEW-${LABVIEW_VERSION_YEAR}-64/labview --headless &
          
          # vipm install --dev --show-progress --labview-version ${LABVIEW_VERSION_YEAR} --labview-bitness 64 # --verbose
          # vipm install wiresmith_technology_lib_g_cli
          vipm install "approvals-dev.vipc" --show-progress --labview-version ${LABVIEW_VERSION_YEAR} --labview-bitness 64 # --verbose

      - name: VIPM List Installed packages
        run: |
          source setup-display.sh
          vipm list --installed
      
      - name: Pre-build Unit Tests
        run: |
          source setup-display.sh
          mkdir -p reports
          SECONDS=0
          echo "Running Caraya Extension Tests"
          ./bin/g-cli Caraya -- -s "Tests/Caraya.Tests/Caraya Extension Tests/Caraya Extension Tests.lvclass" -x "reports/Caraya.UnitTestReport.xml"
          echo "Test Time: $SECONDS"

          # g-cli's connect-back handshake goes through nisvcloc. LUnit leaves its
          # registration state in a way that breaks the next g-cli launch, so restart
          # nisvcloc before running lunit (matches scripts/run_unittests.sh).
          pkill nisvcloc || true
          nohup nisvcloc > /tmp/nisvcloc.log 2>&1 &
          sleep 2

          SECONDS=0
          echo "Running LUnit Tests"
          ./bin/g-cli lunit -- -r "reports/Lunit.UnitTestReport.xml" "Approval Testing.lvproj"
          echo "Test Time: $SECONDS"
      - name: VIPM Build Package          
        run: |
          source setup-display.sh
          echo "Starting LabVIEW"
          /usr/local/natinst/LabVIEW-${LABVIEW_VERSION_YEAR}-64/labview --headless &

          vipm build "Approval Tests.vipb" --labview-version ${LABVIEW_VERSION_YEAR} --labview-bitness 64 --show-progress --version-number ${PACKAGE_VERSION} --build-number ${GITHUB_RUN_NUMBER} # --verbose

      - name: Upload Built Package as Artifact
        if: true
        uses: actions/upload-artifact@v7
        with:
          name: vi-package-${{ env.LABVIEW_IMAGE }}
          path: |
            build/*.vip

      - name: Upload VIPM and LabVIEW Settings as Artifacts (debugging)
        if: always() 
        uses: actions/upload-artifact@v7
        with:
          name: vipm-settings-${{ env.LABVIEW_IMAGE }}
          path: |
            /usr/local/jki/vipm/Settings.ini
            /root/natinst/.config/LabVIEW-${LABVIEW_VERSION_YEAR}/labview*
